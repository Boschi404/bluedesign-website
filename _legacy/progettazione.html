        <div id="loader-logo"></div>

        <div class="loader-section section-left"></div>
        <div class="loader-section section-right"></div>
    </div>
    
    <div class="background"></div>

    <div class="frame">
        <header>
            <img class="logo center" src="images/logo/BlueDesign-Logo.png">
            <br>
            <div class="wide-screen">
                <a class="nav-button" href="index.html">Home</a>
                <a class="nav-button" href="pages/chi-siamo.html">Chi Siamo</a>
                <div class="dropdown">
                    <a class="nav-button">Showroom</a>
                    <div class="dropdown-content">
                        <a class="nav-button short" href="bagni.html">Bagni</a>
                        <a class="nav-button short" href="zona_notte.html">Zona Notte</a>

            </div>
            <div class="narrow-screen" hidden>
                <div id="hamb">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </header>

        <div class="body">
            <form action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data">

                <input type="hidden" name="access_key" value="16fd72d0-bbe4-46df-88c3-c9b1a880a1aa">

                <br>
                <label for="name">Name:</label><br><br>
                <input type="text" id="name" name="name" required><br><br><br>
    
                <label for="surname">Surname:</label><br><br>
                <input type="text" id="surname" name="surname" required><br><br><br>

                <label for="planimetry">Upload Planimetry:</label><br><br>
                <input type="file" id="planimetry" name="planimetry" accept=".pdf,.jpg,.jpeg,.png" required><br><br><br>

                <label for="telephone">Telephone Number:</label><br><br>
                <input type="tel" id="telephone" name="telephone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required><br><br><br>

                <label for="projectType">Type of Project:</label><br><br>
                <select id="projectType" name="projectType" required>
                    <option value="">--Please choose an option--</option>
                    <option value="residential">Residential</option>
                    <option value="commercial">Commercial</option>
                    <option value="office">Office</option>
                    <option value="other">Other</option>
                </select><br><br><br>

                <label for="moreInfo">Descrizione:</label><br><br>
                <textarea id="moreInfo" name="moreInfo" rows="4" cols="50"></textarea><br><br>

                <input type="submit" value="Submit">
                <br>
                <br>
            </form>
        </div>

        <footer>
            <br>

        </footer>
    </div>
